name: Pull All Docker Images  
  
on:  
  workflow_dispatch:  
    inputs:  
      image_tag:  
        description: 'Docker image tag to pull (default: latest)'  
        required: false  
        default: 'latest'  
  schedule:  
    - cron: '0 2 * * 0'  # 每周日凌晨2点自动拉取  
  
jobs:  
  pull-images:  
    runs-on: ubuntu-latest  
    steps:  
      - name: Login to Docker Hub  
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0  
        with:  
          username: ${{ secrets.DOCKERHUB_USER }}  
          password: ${{ secrets.DOCKERHUB_TOKEN }}  
  
      - name: Pull Dify Core Images  
        run: |  
          echo "Pulling Dify core images with tag: ${{ github.event.inputs.image_tag || 'latest' }}"  
            
          # 拉取核心应用镜像  
          docker pull langgenius/dify-api:${{ github.event.inputs.image_tag || 'latest' }}  
          docker pull langgenius/dify-web:${{ github.event.inputs.image_tag || 'latest' }}  
          docker pull langgenius/dify-sandbox:latest  
          docker pull langgenius/dify-plugin-daemon:latest  
            
          # 拉取基础设施镜像  
          docker pull postgres:15-alpine  
          docker pull redis:6-alpine  
          docker pull nginx:alpine  
          docker pull weaviate:1.19.0  
            
          # 拉取可选组件镜像  
          docker pull qdrant/qdrant:latest  
          docker pull milvusdb/milvus:latest  
          docker pull chromadb/chroma:latest  
  
      - name: List Pulled Images  
        run: |  
          echo "=== Successfully pulled images ==="  
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}\t{{.CreatedAt}}" | \  
            grep -E "(langgenius|postgres|redis|nginx|weaviate|qdrant|milvus|chroma)"  
  
      - name: Save Images to Archive (Optional)  
        if: github.event_name == 'workflow_dispatch'  
        run: |  
          mkdir -p images-archive  
          docker save \  
            langgenius/dify-api:${{ github.event.inputs.image_tag || 'latest' }} \  
            langgenius/dify-web:${{ github.event.inputs.image_tag || 'latest' }} \  
            langgenius/dify-sandbox:latest \  
            langgenius/dify-plugin-daemon:latest \  
            postgres:15-alpine \  
            redis:6-alpine \  
            nginx:alpine \  
            weaviate:1.19.0 \  
            -o images-archive/dify-core-images.tar  
  
      - name: Upload Images Archive  
        if: github.event_name == 'workflow_dispatch'  
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0  
        with:  
          name: dify-docker-images  
          path: images-archive/  
          retention-days: 7
