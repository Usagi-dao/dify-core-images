name: Dify Docker Images Pull & Package

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      dify_version:
        description: 'Dify 版本 (如 1.1.3, 0.15.3, latest)'
        required: true
        default: '1.1.3'
        type: string
      sandbox_version:
        description: 'Sandbox 版本 (如 0.2.11)'
        required: true
        default: '0.2.11'
        type: string
      plugin_daemon_version:
        description: 'Plugin Daemon 版本 (如 0.0.6-local)'
        required: true
        default: '0.0.6-local'
        type: string
  
  # 定时触发（每周一凌晨 2 点自动检查更新）
  schedule:
    - cron: '0 2 * * 1'

  # 推送标签时触发
  push:
    tags:
      - 'v*'

env:
  # 默认版本，可通过 workflow_dispatch 覆盖
  DIFY_VERSION: ${{ github.event.inputs.dify_version || '1.1.3' }}
  SANDBOX_VERSION: ${{ github.event.inputs.sandbox_version || '0.2.11' }}
  PLUGIN_DAEMON_VERSION: ${{ github.event.inputs.plugin_daemon_version || '0.0.6-local' }}

jobs:
  pull-and-package:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-docker-action@v4
        with:
          docker-version: '24.0.7'

      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.23.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version

      - name: Clone Dify Repository
        run: |
          git clone --depth 1 --branch ${{ env.DIFY_VERSION }} https://github.com/langgenius/dify.git dify-src || \
          git clone --depth 1 https://github.com/langgenius/dify.git dify-src
          ls -la dify-src/docker/

      - name: Define Image List
        id: images
        run: |
          # 定义所有需要的镜像列表
          IMAGES=(
            "langgenius/dify-api:${{ env.DIFY_VERSION }}"
            "langgenius/dify-web:${{ env.DIFY_VERSION }}"
            "langgenius/dify-sandbox:${{ env.SANDBOX_VERSION }}"
            "langgenius/dify-plugin-daemon:${{ env.PLUGIN_DAEMON_VERSION }}"
            "postgres:15-alpine"
            "redis:6-alpine"
            "nginx:latest"
            "semitechnologies/weaviate:1.19.0"
            "ubuntu/squid:latest"
          )
          
          # 输出镜像列表供后续步骤使用
          echo "IMAGE_LIST<<EOF" >> $GITHUB_OUTPUT
          for img in "${IMAGES[@]}"; do
            echo "$img" >> $GITHUB_OUTPUT
          done
          echo "EOF" >> $GITHUB_OUTPUT
          
          # 显示将要拉取的镜像
          echo "将要拉取的镜像列表："
          for img in "${IMAGES[@]}"; do
            echo "  - $img"
          done

      - name: Pull Docker Images
        run: |
          # 从 docker-compose 拉取（如果存在）
          if [ -f "dify-src/docker/docker-compose.yaml" ]; then
            echo "从 docker-compose.yaml 拉取镜像..."
            cd dify-src/docker
            docker-compose pull || true
            cd ../..
          fi
          
          # 显式拉取所有镜像（确保都拉取到）
          echo "显式拉取所有镜像..."
          while IFS= read -r image; do
            [ -z "$image" ] && continue
            echo "拉取镜像: $image"
            docker pull "$image" || echo "警告: $image 拉取失败"
          done <<< "${{ steps.images.outputs.IMAGE_LIST }}"
          
          # 显示已拉取的镜像
          echo "已拉取的镜像："
          docker images | grep -E 'dify|postgres|redis|nginx|weaviate|squid' || true

      - name: Save Images to TAR
        run: |
          mkdir -p output
          
          # 方式一：打包成单个文件（推荐）
          echo "打包所有镜像到单个文件..."
          docker save -o output/dify-all-images.tar \
            langgenius/dify-api:${{ env.DIFY_VERSION }} \
            langgenius/dify-web:${{ env.DIFY_VERSION }} \
            langgenius/dify-sandbox:${{ env.SANDBOX_VERSION }} \
            langgenius/dify-plugin-daemon:${{ env.PLUGIN_DAEMON_VERSION }} \
            postgres:15-alpine \
            redis:6-alpine \
            nginx:latest \
            semitechnologies/weaviate:1.19.0 \
            ubuntu/squid:latest
          
          # 方式二：分开打包（可选，取消注释以启用）
          # mkdir -p output/split
          # docker save langgenius/dify-api:${{ env.DIFY_VERSION }} -o output/split/dify-api.tar
          # docker save langgenius/dify-web:${{ env.DIFY_VERSION }} -o output/split/dify-web.tar
          # docker save langgenius/dify-sandbox:${{ env.SANDBOX_VERSION }} -o output/split/dify-sandbox.tar
          # docker save langgenius/dify-plugin-daemon:${{ env.PLUGIN_DAEMON_VERSION }} -o output/split/dify-plugin-daemon.tar
          # docker save postgres:15-alpine -o output/split/postgres.tar
          # docker save redis:6-alpine -o output/split/redis.tar
          # docker save nginx:latest -o output/split/nginx.tar
          # docker save semitechnologies/weaviate:1.19.0 -o output/split/weaviate.tar
          # docker save ubuntu/squid:latest -o output/split/squid.tar
          
          # 复制 docker-compose 文件和配置
          cp dify-src/docker/docker-compose.yaml output/ 2>/dev/null || true
          cp dify-src/docker/.env.example output/ 2>/dev/null || true
          cp dify-src/docker/docker-compose.middleware.yaml output/ 2>/dev/null || true
          
          # 生成镜像清单文件
          echo "# Dify Docker Images List" > output/images-list.txt
          echo "Version: ${{ env.DIFY_VERSION }}" >> output/images-list.txt
          echo "Date: $(date)" >> output/images-list.txt
          echo "" >> output/images-list.txt
          docker images --format "{{.Repository}}:{{.Tag}}" | grep -E 'dify|postgres|redis|nginx|weaviate|squid' >> output/images-list.txt
          
          # 显示输出目录
          ls -lh output/

      - name: Compress Output (Optional)
        run: |
          # 如果文件太大，可以压缩（GitHub Releases 有 2GB 限制）
          cd output
          tar -czf dify-all-images.tar.gz dify-all-images.tar
          ls -lh *.tar.gz

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dify-docker-images-${{ env.DIFY_VERSION }}
          path: |
            output/dify-all-images.tar
            output/docker-compose.yaml
            output/.env.example
            output/images-list.txt
          retention-days: 30
          compression-level: 0  # 已经压缩过了

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            output/dify-all-images.tar
            output/dify-all-images.tar.gz
            output/docker-compose.yaml
            output/.env.example
            output/images-list.txt
          body: |
            Dify Docker Images Bundle
            - Version: ${{ env.DIFY_VERSION }}
            - Sandbox: ${{ env.SANDBOX_VERSION }}
            - Plugin Daemon: ${{ env.PLUGIN_DAEMON_VERSION }}
            
            ## 包含镜像
            - langgenius/dify-api:${{ env.DIFY_VERSION }}
            - langgenius/dify-web:${{ env.DIFY_VERSION }}
            - langgenius/dify-sandbox:${{ env.SANDBOX_VERSION }}
            - langgenius/dify-plugin-daemon:${{ env.PLUGIN_DAEMON_VERSION }}
            - postgres:15-alpine
            - redis:6-alpine
            - nginx:latest
            - semitechnologies/weaviate:1.19.0
            - ubuntu/squid:latest
            
            ## 使用方法
            1. 下载 `dify-all-images.tar`
            2. 在离线机器上执行: `docker load -i dify-all-images.tar`
            3. 复制 `docker-compose.yaml` 和 `.env.example` 到目标机器
            4. 配置 `.env` 文件并启动: `docker-compose up -d`
          draft: false
          prerelease: false

      - name: Cleanup
        if: always()
        run: |
          docker system prune -af || true
